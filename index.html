<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SextaCorda - Suas Cifras Online 🎸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #e67e22;
            --dark: #2c3e50;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: var(--dark);
        }

        header {
            background-color: var(--dark);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .search-area {
            max-width: 600px;
            margin: -25px auto 30px;
            padding: 0 15px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: 16px;
            outline: none;
        }

        #lista-cifras {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 15px 50px;
        }

        .cifra-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
            border-left: 5px solid var(--primary);
            transition: transform 0.2s;
        }

        .cifra-card h3 {
            margin: 0 0 15px 0;
            color: var(--dark);
            font-size: 1.4rem;
        }

        .cifra-card small {
            display: block;
            color: #7f8c8d;
            margin-top: -10px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        pre {
            background-color: #fafafa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.7;
            font-size: 1.05rem;
            color: #333;
            border: 1px solid #eee;
        }

        .loading { text-align: center; margin-top: 50px; color: #95a5a6; }
    </style>
</head>
<body>

    <header>
        <h1>🎸 SextaCorda</h1>
        <p>Encontre sua música e comece a tocar</p>
    </header>

    <div class="search-area">
        <input type="text" id="inputBusca" placeholder="Qual música você quer tocar hoje?" onkeyup="filtrarCifras()">
    </div>

    <div id="lista-cifras">
        <p class="loading">Sintonizando as cordas (carregando)...</p>
    </div>

    <script>
        // CONFIGURAÇÃO REAL DO SEU SUPABASE
        const SUPABASE_URL = 'https://pqqlakirbslqxmcwfoje.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcWxha2lyYnNscXhtY3dmb2plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDk0ODMsImV4cCI6MjA4OTE4NTQ4M30.bWThqwnUHvLW1N4QMIahemIzLQ0qfoQeGkU2q-ZIRQU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let bancoDeCifras = [];

        async function carregarCifras() {
            const { data, error } = await _supabase
                .from('cifras')
                .select('*')
                .order('titulo', { ascending: true });

            if (error) {
                document.getElementById('lista-cifras').innerHTML = "Erro ao conectar com o banco.";
                return;
            }

            bancoDeCifras = data;
            exibirCifras(data);
        }

        function exibirCifras(lista) {
            const container = document.getElementById('lista-cifras');
            if (lista.length === 0) {
                container.innerHTML = '<p class="loading">Nenhuma música encontrada por aqui ainda. 🪕</p>';
                return;
            }

            container.innerHTML = lista.map(item => `
                <div class="cifra-card">
                    <h3>${item.titulo}</h3>
                    <small>Artista: ${item.artista}</small>
                    <pre>${item.conteudo}</pre>
                </div>
            `).join('');
        }

        function filtrarCifras() {
            const busca = document.getElementById('inputBusca').value.toLowerCase();
            const resultados = bancoDeCifras.filter(c => 
                c.titulo.toLowerCase().includes(busca) || 
                c.artista.toLowerCase().includes(busca)
            );
            exibirCifras(resultados);
        }

        carregarCifras();
    </script>
</body>
</html>
