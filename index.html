<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta Corda - Cifras 🎸</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" type="text/css" href="https://jtab.t-0.it/css/jtab.css">
    <script src="https://unpkg.com/vexchords/dist/vexchords.dev.js"></script>

    <style>
        :root { --primary: #d35400; --dark: #1a1a1a; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--dark); }
        header { background: var(--dark); color: white; padding: 30px 1rem; text-align: center; border-bottom: 4px solid var(--primary); }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Lista de Músicas */
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; margin-top: -30px; margin-bottom: 25px; box-sizing: border-box; }
        .musica-item { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #eee; }

        /* Layout Duas Colunas */
        .cifra-layout { display: flex; gap: 30px; display: none; }
        .cifra-principal { flex: 2; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .sidebar-acordes { flex: 1; background: #fff; padding: 20px; border-radius: 15px; border: 1px solid #eee; height: fit-content; position: sticky; top: 20px; }

        pre { background: #fff; padding: 15px; font-family: 'Courier New', monospace; line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap; border: none; }
        b { color: var(--primary); font-weight: bold; font-size: 1.2rem; }

        /* Estilo dos desenhos do jTab */
        .jtab-container { margin-bottom: 20px; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .jtab-label { font-weight: bold; display: block; margin-bottom: 5px; color: var(--primary); }
        
        .btn-voltar { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <header onclick="window.location.reload()">
        <h1>🎸 SEXTA CORDA</h1>
    </header>

    <div class="container">
        <div id="sessao-lista">
            <input type="text" id="inputBusca" placeholder="🔍 Buscar música ou artista..." onkeyup="filtrar()">
            <div id="lista-cifras"><p style="text-align:center">Conectando ao banco...</p></div>
        </div>

        <div id="tela-cifra" class="cifra-layout">
            <div class="cifra-principal">
                <button class="btn-voltar" onclick="voltar()">← Voltar</button>
                <h2 id="view-titulo" style="margin:0; font-size: 2rem;"></h2>
                <p id="view-artista" style="color: var(--primary); font-size: 1.2rem; margin-top: 5px;"></p>
                <hr style="opacity: 0.1; margin: 20px 0;">
                <pre id="view-conteudo"></pre>
            </div>
            
            <div class="sidebar-acordes">
                <h3 style="margin-top:0">Dicionário de Acordes</h3>
                <div id="dicionario-desenhos"></div>
            </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://pqqlakirbslqxmcwfoje.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcWxha2lyYnNscXhtY3dmb2plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDk0ODMsImV4cCI6MjA4OTE4NTQ4M30.bWThqwnUHvLW1N4QMIahemIzLQ0qfoQeGkU2q-ZIRQU');

        let dados = [];

        async function buscar() {
            const { data, error } = await _supabase.from('cifras').select('*').order('titulo');
            if (error) {
                document.getElementById('lista-cifras').innerHTML = "Erro de conexão.";
            } else {
                dados = data;
                renderizar(data);
            }
        }

        function renderizar(lista) {
            const div = document.getElementById('lista-cifras');
            div.innerHTML = lista.map(c => `
                <div class="musica-item" onclick="abrir('${c.id}')">
                    <span><strong>${c.titulo}</strong> - ${c.artista}</span>
                    <span style="color: var(--primary)">TOCAR ➔</span>
                </div>
            `).join('');
        }

        function abrir(id) {
    const c = dados.find(x => x.id == id);
    document.getElementById('sessao-lista').style.display = 'none';
    document.getElementById('tela-cifra').style.display = 'flex';
    
    document.getElementById('view-titulo').innerText = c.titulo;
    document.getElementById('view-artista').innerText = c.artista;
    document.getElementById('view-conteudo').innerHTML = c.conteudo;

    const dic = document.getElementById('dicionario-desenhos');
    dic.innerHTML = "";
    
    const encontrados = c.conteudo.match(/<b>(.*?)<\/b>/g) || [];
    const unicos = [...new Set(encontrados.map(m => m.replace(/<\/?b>/g, '').trim()))];

    unicos.forEach(ac => {
        // Criar o container do acorde
        const container = document.createElement('div');
        container.style.marginBottom = "20px";
        container.innerHTML = `<strong style="color:var(--primary)">${ac}</strong><div id="chord-${ac}"></div>`;
        dic.appendChild(container);

        // Desenhar o acorde usando VexChords
        // Esta biblioteca desenha o "esqueleto" do acorde
        try {
            const selector = `#chord-${ac}`;
            // Mapeamento simples para acordes básicos (D, G, Bm, etc)
            // O VexChords desenha o diagrama
            new veychords.ChordBox(selector, {
                width: 120,
                height: 140,
                circleRadius: 4
            }).draw({
                chord: getChordStructure(ac), // Função que define onde colocar os dedos
                position: 0
            });
        } catch(e) { console.log("Erro ao desenhar " + ac); }
    });
}

// Função auxiliar para dizer à biblioteca onde colocar os dedos
function getChordStructure(name) {
    const chords = {
        "D": [[1, 2], [2, 3], [3, 2]],
        "G": [[1, 3], [5, 2], [6, 3]],
        "A": [[2, 2], [3, 2], [4, 2]],
        "Bm": [[1, 2, 'p'], [2, 3], [3, 4], [4, 4]],
        "F#": [[1, 2, 'p'], [2, 3], [3, 4], [4, 4], [5, 4]],
        "Gm": [[1, 3, 'p'], [4, 5], [5, 5]]
    };
    return chords[name] || []; // Se não conhecer o acorde, desenha o braço vazio
}

        function voltar() {
            document.getElementById('sessao-lista').style.display = 'block';
            document.getElementById('tela-cifra').style.display = 'none';
        }

        function filtrar() {
            const t = document.getElementById('inputBusca').value.toLowerCase();
            renderizar(dados.filter(d => d.titulo.toLowerCase().includes(t) || d.artista.toLowerCase().includes(t)));
        }

        buscar();
    </script>
</body>
</html>
