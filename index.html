<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sexta Corda - Cifras 🎸</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #d35400; --dark: #1a1a1a; --bg: #fdfdfd; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--dark); }
        header { background: var(--dark); color: white; padding: 30px 1rem; text-align: center; cursor: pointer; border-bottom: 4px solid var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        input[type="text"] { 
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee; 
            margin-top: -30px; margin-bottom: 25px; box-sizing: border-box; font-size: 16px;
        }

        .musica-item { 
            background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px;
            cursor: pointer; display: flex; justify-content: space-between; border: 1px solid #eee;
        }

        /* Layout em Duas Colunas para a Cifra */
        .cifra-layout { display: flex; gap: 20px; display: none; }
        .cifra-principal { flex: 3; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .sidebar-acordes { flex: 1; background: #f9f9f9; padding: 15px; border-radius: 15px; height: fit-content; border: 1px solid #eee; }

        pre { 
            background: #fff; padding: 15px; overflow-x: auto; 
            font-family: 'Courier New', monospace; line-height: 1.8; font-size: 1.1rem; white-space: pre-wrap;
        }
        b { color: var(--primary); font-weight: bold; }

        .acorde-card { text-align: center; margin-bottom: 20px; background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        .acorde-card img { width: 100%; max-width: 100px; height: auto; }
        
        .btn-voltar { background: #eee; border: none; padding: 10px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <header onclick="window.location.reload()">
        <h1>🎸 SEXTA CORDA</h1>
    </header>

    <div class="container">
        <div id="sessao-lista">
            <input type="text" id="inputBusca" placeholder="🔍 Buscar música..." onkeyup="filtrar()">
            <div id="lista-cifras"><p style="text-align:center">Conectando ao banco...</p></div>
        </div>

        <div id="tela-cifra" class="cifra-layout">
            <div class="cifra-principal">
                <button class="btn-voltar" onclick="voltar()">← Voltar</button>
                <h2 id="view-titulo" style="margin:0"></h2>
                <p id="view-artista" style="color: var(--primary); margin-bottom: 20px;"></p>
                <pre id="view-conteudo"></pre>
            </div>
            <div class="sidebar-acordes" id="sidebar-acordes">
                </div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://pqqlakirbslqxmcwfoje.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxcWxha2lyYnNscXhtY3dmb2plIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDk0ODMsImV4cCI6MjA4OTE4NTQ4M30.bWThqwnUHvLW1N4QMIahemIzLQ0qfoQeGkU2q-ZIRQU');

        let dados = [];

        async function buscar() {
            const { data, error } = await _supabase.from('cifras').select('*').order('titulo');
            if (error) {
                document.getElementById('lista-cifras').innerHTML = "Erro: " + error.message;
            } else {
                dados = data;
                renderizar(data);
            }
        }

        function renderizar(lista) {
            const div = document.getElementById('lista-cifras');
            div.innerHTML = lista.map(c => `
                <div class="musica-item" onclick="abrir('${c.id}')">
                    <span><strong>${c.titulo}</strong> - ${c.artista}</span>
                    <span>➔</span>
                </div>
            `).join('');
        }

function abrir(id) {
    const c = dados.find(x => x.id == id);
    document.getElementById('sessao-lista').style.display = 'none';
    document.getElementById('tela-cifra').style.display = 'flex';
    
    document.getElementById('view-titulo').innerText = c.titulo;
    document.getElementById('view-artista').innerText = c.artista;
    document.getElementById('view-conteudo').innerHTML = c.conteudo;

    const sidebar = document.getElementById('sidebar-acordes');
    sidebar.innerHTML = "<h3>Acordes</h3>";
    
    // Procura o que está entre <b> e </b>
    const encontrados = c.conteudo.match(/<b>(.*?)<\/b>/g) || [];
    const unicos = [...new Set(encontrados.map(m => m.replace(/<\/?b>/g, '').trim()))];

    if (unicos.length === 0) {
        sidebar.innerHTML += "<p style='color:#888; font-size:12px;'>Use &lt;b&gt; nos acordes para ver os desenhos.</p>";
    }

    unicos.forEach(ac => {
        // Formata o nome para a API (ex: F#m vira Fsm)
        const acFormatado = ac.replace('#', 's').replace('+', 'aug');
        const imgUrl = `https://api.chordify.net/img/diagrams/guitar/${acFormatado}.png`;
        
        // Criamos o elemento HTML
        const card = document.createElement('div');
        card.className = 'acorde-card';
        card.innerHTML = `
            <small><strong>${ac}</strong></small><br>
            <img src="${imgUrl}" style="width:100%; min-height:50px;" alt="${ac}">
        `;
        
        // Se a imagem falhar, a gente remove apenas o card individual, não apaga tudo
        card.querySelector('img').onerror = function() {
            card.remove();
        };

        sidebar.appendChild(card);
    });
}
        buscar();
    </script>
</body>
</html>
